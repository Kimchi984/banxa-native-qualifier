<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banxa — Integration Qualifier</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0D0D0D;
      color: #FFFFFF;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    .logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 4px;
      color: #00D4D4;
      margin-bottom: 2rem;
      align-self: flex-start;
      max-width: 680px;
      width: 100%;
    }

    .page { width: 100%; max-width: 680px; }

    /* Mode selector */
    .mode-select { margin-bottom: 1.5rem; }
    .mode-label { font-size: 12px; color: #CCCCCC; letter-spacing: 0.05em; margin-bottom: 10px; }
    .mode-btns { display: flex; gap: 10px; }
    .mode-btn {
      flex: 1;
      padding: 12px 16px;
      border: 0.5px solid #2A2A2A;
      border-radius: 10px;
      background: #1A1A1A;
      color: #CCCCCC;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
      line-height: 1.4;
    }
    .mode-btn:hover { border-color: #888; color: #FFFFFF; }
    .mode-btn.active { border-color: #00D4D4; color: #00D4D4; background: #0A2020; }
    .mode-btn strong { display: block; font-size: 14px; margin-bottom: 2px; color: #FFFFFF; }

    /* Chat */
    .chat-card {
      background: #1A1A1A;
      border: 0.5px solid #2A2A2A;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 480px;
    }

    .messages {
      flex: 1;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow-y: auto;
      max-height: 520px;
    }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 85%;
    }
    .msg.assistant { align-self: flex-start; }
    .msg.user { align-self: flex-end; }

    .msg-bubble {
      padding: 11px 15px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .msg.assistant .msg-bubble {
      background: #222222;
      border: 0.5px solid #2A2A2A;
      color: #FFFFFF;
      border-top-left-radius: 4px;
    }
    .msg.user .msg-bubble {
      background: #00D4D4;
      color: #0D0D0D;
      font-weight: 500;
      border-top-right-radius: 4px;
    }

    /* Verdict styling */
    .verdict-block {
      background: #111111;
      border: 0.5px solid #2A2A2A;
      border-radius: 10px;
      padding: 14px 16px;
      margin-top: 4px;
      font-size: 13px;
      line-height: 1.7;
      color: #FFFFFF;
      white-space: pre-wrap;
    }
    .verdict-fit { border-color: #00D4D4; }
    .verdict-discuss { border-color: #CC8800; }
    .verdict-notfit { border-color: #CC4444; }

    /* Typing indicator */
    .typing {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 11px 15px;
      background: #222222;
      border: 0.5px solid #2A2A2A;
      border-radius: 12px;
      border-top-left-radius: 4px;
      width: fit-content;
    }
    .typing span {
      width: 6px; height: 6px;
      background: #9A9A9A;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* Input area */
    .input-area {
      padding: 1rem 1.25rem;
      border-top: 0.5px solid #2A2A2A;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .input-area textarea {
      flex: 1;
      background: #111111;
      border: 0.5px solid #2A2A2A;
      border-radius: 8px;
      color: #FFFFFF;
      font-size: 14px;
      font-family: inherit;
      padding: 10px 14px;
      resize: none;
      min-height: 42px;
      max-height: 120px;
      line-height: 1.5;
      outline: none;
      transition: border-color 0.15s;
    }
    .input-area textarea:focus { border-color: #888; }
    .input-area textarea::placeholder { color: #666; }

    .send-btn {
      width: 42px;
      height: 42px;
      background: #00D4D4;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .send-btn:hover { background: #00AAAA; }
    .send-btn:disabled { background: #1A3A3A; cursor: default; }
    .send-btn svg { width: 18px; height: 18px; }

    .restart-btn {
      margin-top: 1rem;
      font-size: 13px;
      color: #CCCCCC;
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      padding: 0;
    }
    .restart-btn:hover { color: #FFFFFF; }

    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 14px;
      padding: 2rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="logo">BANXA</div>
  <div class="page">

    <div class="mode-select">
      <p class="mode-label">SELECT QUALIFIER</p>
      <div class="mode-btns">
        <button class="mode-btn" id="btn-native" onclick="selectMode('native')">
          <strong>Banxa Native fit check</strong>
          Is this partner right for Banxa Native?
        </button>
        <button class="mode-btn" id="btn-general" onclick="selectMode('general')">
          <strong>General integration options</strong>
          Which Banxa product fits this partner?
        </button>
      </div>
    </div>

    <div class="chat-card">
      <div class="messages" id="messages">
        <div class="empty-state">Select a qualifier above to begin</div>
      </div>
      <div class="input-area">
        <textarea id="input" placeholder="Type your answer..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)" disabled></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="#0D0D0D" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>

    <button class="restart-btn" id="restart-btn" onclick="restart()" style="display:none">← Start over</button>
  </div>

  <script>
    const SYSTEM_NATIVE = `You are a qualification tool for Banxa Native, a headless ramp infrastructure product for partners embedding fiat ↔ crypto into their mobile app.

Your job is to ask a short series of questions to determine whether a partner is a fit for Banxa Native, and if so, confirm the integration requirements. Output a clear verdict and a plain-language summary the BD team can use in the conversation.

Ask the following questions one at a time, in order. Wait for an answer before continuing.

1. What technology is the partner's app built on? (React Native, web, native iOS/Android, or something else?) The SDK is React Native only today — web and native iOS/Android are on the roadmap.

2. Does the partner verify user identity (KYC)? This means collecting and checking personal details and documents — either directly or through a provider like Sumsub.

3. Does the partner have backend infrastructure that can make server-to-server API calls?

4. Does the partner have a unique, stable identifier for each of their users (for example, an account ID or user ID — not just a wallet address)?

5. Does the partner's team have engineering resource available to implement an API + SDK integration?

After all five answers, output:

---
VERDICT: [FIT / NOT A FIT / DISCUSS FURTHER]

Summary:
[2-3 sentences describing whether the partner is a fit for Banxa Native and why, in plain language a BD person can use in conversation]

If NOT A FIT, add:
Suggested next step:
[One sentence on where to route the conversation]

If DISCUSS FURTHER, add:
Open question:
[The specific thing to flag to the product team]
---

Rules:
- Keep questions conversational, not clinical
- Don't explain why you're asking each question
- Don't output the verdict until all five questions are answered
- Verdict of NOT A FIT if: no KYC, no backend, or no persistent user ID
- Verdict of DISCUSS FURTHER if: they do KYC and have a backend but lack a persistent user ID, or they don't have a mobile app yet
- Verdict of FIT if: yes to all five`;

    const SYSTEM_GENERAL = `You are a qualification tool for Banxa's partner integration options. Banxa has four integration products:

1. Banxa Checkout — Referral: URL-based, no backend needed, fastest to market. No webhooks or order lookup. Best for partners who want to go live quickly with minimal engineering.

2. Banxa Checkout — REST API: Server-to-server, full control. Webhooks, KYC sharing, quote UI, order history. Best for partners who want programmatic control and real-time order status.

3. Banxa Checkout — React Native SDK: Wraps the REST API for mobile apps. Type-safe, handles WebView plumbing, no backend needed for core flows. Best for mobile-first partners who want fast integration with native feel.

4. Banxa Native: Headless ramp infrastructure for partners who do KYC and have a backend. Full UX control, native payment sheet (cards, Apple Pay, Google Pay), no Banxa-branded screens. Requires engineering capability.

Your job is to ask a short series of questions and recommend the right product or combination.

Ask one at a time, in order:

1. What technology is the partner's app built on? Options: React Native, web, native iOS/Android, or a combination. Note: the SDK is React Native only today — web (JS SDK) and native iOS/Android are on the roadmap.

2. Does the partner's platform verify user identity (KYC)? Either directly or through a provider like Sumsub?

3. Does the partner have backend infrastructure for server-to-server API calls?

4. Does the partner need real-time order status updates pushed to their system (webhooks)?

5. Does the partner have engineering resource available for integration work?

After all five answers, output:

---
RECOMMENDED PATH: [Product name]

Why:
[2-3 sentences explaining why this path fits]

What they get:
[2-3 bullet points on key outcomes]

If relevant, add:
Also consider:
[One sentence on an adjacent option]
---

Rules:
- Route to Banxa Native only if: they do KYC AND have a backend AND are building a mobile app
- Route to React Native SDK if: mobile app, no KYC requirement, has engineering resource
- Route to REST API if: web or both platforms, has backend, needs webhooks or KYC sharing
- Route to Referral if: wants fastest path, no webhooks needed, minimal engineering
- Never recommend Banxa Native to partners who don't do KYC
- Keep the tone conversational and concise`;

    let mode = null;
    let history = [];
    let loading = false;

    function selectMode(m) {
      mode = m;
      document.getElementById('btn-native').classList.toggle('active', m === 'native');
      document.getElementById('btn-general').classList.toggle('active', m === 'general');
      restart();
    }

    function restart() {
      history = [];
      const msgs = document.getElementById('messages');
      msgs.innerHTML = '';
      document.getElementById('input').disabled = false;
      document.getElementById('send-btn').disabled = false;
      document.getElementById('restart-btn').style.display = 'none';
      if (mode) startConversation();
    }

    async function startConversation() {
      await callClaude('Start the qualification. Ask the first question.');
    }

    function addMessage(role, text, isVerdict) {
      const msgs = document.getElementById('messages');

      // Remove empty state
      const empty = msgs.querySelector('.empty-state');
      if (empty) empty.remove();

      const wrapper = document.createElement('div');
      wrapper.className = `msg ${role}`;

      if (role === 'assistant' && isVerdict) {
        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        bubble.textContent = text.split('---')[0].trim();
        wrapper.appendChild(bubble);

        const verdict = document.createElement('div');
        const verdictText = text.includes('---') ? text.split('---')[1].trim() : '';
        if (verdictText) {
          verdict.className = 'verdict-block';
          if (verdictText.includes('FIT\n') && !verdictText.includes('NOT A FIT') && !verdictText.includes('DISCUSS')) verdict.classList.add('verdict-fit');
          else if (verdictText.includes('NOT A FIT')) verdict.classList.add('verdict-notfit');
          else if (verdictText.includes('DISCUSS FURTHER') || verdictText.includes('RECOMMENDED PATH')) verdict.classList.add('verdict-discuss');
          verdict.textContent = verdictText;
          wrapper.appendChild(verdict);
        }
      } else {
        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        bubble.textContent = text;
        wrapper.appendChild(bubble);
      }

      msgs.appendChild(wrapper);
      msgs.scrollTop = msgs.scrollHeight;
      return wrapper;
    }

    function showTyping() {
      const msgs = document.getElementById('messages');
      const t = document.createElement('div');
      t.className = 'msg assistant';
      t.id = 'typing';
      t.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
      msgs.appendChild(t);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    async function callClaude(userMsg) {
      if (loading) return;
      loading = true;

      const systemPrompt = mode === 'native' ? SYSTEM_NATIVE : SYSTEM_GENERAL;

      history.push({ role: 'user', content: userMsg });
      showTyping();

      document.getElementById('input').disabled = true;
      document.getElementById('send-btn').disabled = true;

      try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            system: systemPrompt,
            messages: history
          })
        });

        const data = await res.json();
        const reply = data.content?.[0]?.text || 'Something went wrong — please try again.';

        removeTyping();
        history.push({ role: 'assistant', content: reply });

        const isVerdict = reply.includes('VERDICT:') || reply.includes('RECOMMENDED PATH:');
        addMessage('assistant', reply, isVerdict);

        if (isVerdict) {
          document.getElementById('input').disabled = true;
          document.getElementById('send-btn').disabled = true;
          document.getElementById('restart-btn').style.display = 'block';
        } else {
          document.getElementById('input').disabled = false;
          document.getElementById('send-btn').disabled = false;
          document.getElementById('input').focus();
        }

      } catch (err) {
        removeTyping();
        addMessage('assistant', 'Something went wrong — please refresh and try again.');
      }

      loading = false;
    }

    async function sendMessage() {
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text || loading) return;

      input.value = '';
      autoResize(input);
      addMessage('user', text);
      await callClaude(text);
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }
  </script>
</body>
</html>
